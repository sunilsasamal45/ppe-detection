<!DOCTYPE html>
{%load static%}
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Video Streaming</title>
    <link rel="stylesheet" type="text/css" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>

<body>
    <div class="sidebar">
        <h1>PPE Detection</h1>
        <!-- Confidence Threshold Slider -->
        <label for="confidence-slider">Confidence Threshold:</label>
        <input type="range" id="confidence-slider" min="0.1" max="1.0" value="0.1" step="0.1">
        <!-- Confidence Threshold Slider -->
        <span id="confidence-value">0.1</span>
        <button id="start-button">Start Streaming</button>
        <button id="stop-button" disabled>Stop Streaming</button>

        <select id="class-id-select" multiple>
            <option value="0">Helmet</option>
            <option value="2">No Helmet</option>
            <option value="3">Safety Vest</option>
            <option value="1">No Vest</option>
            <option value="4">Shoes</option>
        </select>
        <button id="set-class-button">Set Classes to Detect</button>

        <div id="detected-classes"></div>
        <!-- Logs URL -->
        <a href="{% url 'detection_list' %}" class="logs-link" target="_blank" rel="noopener noreferrer">View Logs</a>


    </div>

    <div class="video-container">
        <img id="video-frame" src="" alt="Video Stream" style="width: 100%; height: 100%; max-width: 640px;">
        <div id="status" class="status-disconnected">
            <i class="fas fa-times"></i>
        </div>
    </div>
    <script src="{% static 'js/script.js' %}"></script>
</body>
</html>
